<app-navbar></app-navbar>
<app-menu></app-menu>
<div class="purchases-container">

  <!-- Cabeçalho -->
  <header class="purchases-header">
    <div class="title">
      <i class="fas fa-truck-loading"></i>
      <h2>Compras aos Fornecedores</h2>
    </div>

    <button class="btn-primary" (click)="novaCompra()">
      <i class="fas fa-plus"></i>
      Nova Compra
    </button>
  </header>

  <!-- Resumo -->
  <section class="purchases-summary">
    <div class="summary-card">
      <span>Total de Compras</span>
      <strong>9</strong>
    </div>

    <div class="summary-card">
      <span>Valor Total</span>
      <strong>680 000 Kz</strong>
    </div>

    <div class="summary-card">
      <span>Este Mês</span>
      <strong>210 000 Kz</strong>
    </div>
  </section>

  <!-- Tabela -->
  <section class="purchases-table">
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>Data</th>
          <th>Fornecedor</th>
          <th>Produto</th>
          <th>Quantidade</th>
          <th>Valor</th>
          <th>Status</th>
          <th>Ações</th>
        </tr>
      </thead>

      <tbody>
        <tr *ngFor="let purchase of purchases">
          <td>{{ purchase.id }}</td>
          <td>{{ purchase.date }}</td>
          <td>{{ purchase.supplier }}</td>
          <td>{{ purchase.product }}</td>
          <td>{{ purchase.quantity }}</td>
          <td>{{ purchase.total }} Kz</td>

          <td>
            <span class="status" [class.received]="purchase.status === 'Recebido'"
              [class.pending]="purchase.status === 'Pendente'">
              {{ purchase.status }}
            </span>
          </td>

          <td class="actions">
            <button title="Detalhes" (click)="verDetalhes(purchase)">
              <i class="fas fa-eye"></i>
            </button>

            <button title="Documento" (click)="verDocumento(purchase)">
              <i class="fas fa-file-alt"></i>
            </button>
          </td>
        </tr>
      </tbody>
    </table>
  </section>

</div>
