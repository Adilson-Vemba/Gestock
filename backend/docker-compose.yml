services:
  api:
    build: .
    ports:
      - "8080:8080"
    restart: unless-stopped
    depends_on:
      - mongo
    volumes:
      - .:/app
      - /app/node_modules
      - ./uploads:/app/uploads 
    environment:
      - PORT=8080
      - DB_URL=mongodb://root:password@mongo:27017/stock_manager?authSource=admin

  mongo:
    image: mongo:6.0
    restart:  unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: password
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
volumes:
  mongo_data: 